<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Website</title>
    <script>
        // Improved sendMessage function with better error handling and XSS protection
        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value;
            const loadingIndicator = document.getElementById('loadingIndicator');

            if (!message) {
                alert('Message cannot be empty.');
                return;
            }

            loadingIndicator.style.display = 'block';
            // Simulate sending message (replace with actual send logic)
            setTimeout(() => {
                try {
                    // Send message functionality (placeholder)
                    const messageContainer = document.getElementById('messages');
                    const newMessage = document.createElement('div');
                    newMessage.textContent = message; // XSS protection
                    messageContainer.appendChild(newMessage);
                    messageInput.value = '';
                } catch (error) {
                    console.error('Error sending message:', error);
                    alert('Failed to send message. Please try again.');
                } finally {
                    loadingIndicator.style.display = 'none';
                }
            }, 1000);
        }

        // Improved loadMessages function with async/await, error handling, and XSS protection
        async function loadMessages() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            const messageContainer = document.getElementById('messages');
            
            loadingIndicator.style.display = 'block';
            messageContainer.innerHTML = '';
            
            try {
                const response = await fetch('/messages');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                messageContainer.innerHTML = '';
                
                if (Array.isArray(data)) {
                    data.forEach(msg => {
                        const messageElement = document.createElement('div');
                        // XSS protection: use textContent instead of innerHTML
                        messageElement.textContent = msg.text || msg;
                        messageElement.className = 'message-item';
                        messageContainer.appendChild(messageElement);
                    });
                    
                    if (data.length === 0) {
                        messageContainer.innerHTML = '<p>No messages yet.</p>';
                    }
                } else {
                    messageContainer.innerHTML = '<p>Invalid message format.</p>';
                }
                
            } catch (error) {
                console.error('Error loading messages:', error);
                messageContainer.innerHTML = '<p>Error loading messages: ' + error.message + '</p>';
            } finally {
                loadingIndicator.style.display = 'none';
            }
        }
    </script>
</head>
<body onload="loadMessages()">
    <div id="loadingIndicator" style="display: none;">Loading...</div>
    <input type="text" id="messageInput" placeholder="Type a message" />
    <button onclick="sendMessage()">Send</button>
    <div id="messages"></div>
</body>
</html>
