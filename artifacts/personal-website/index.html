<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Website</title>
    <script>
        // Improved sendMessage function with better error handling and XSS protection
        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value;
            const loadingIndicator = document.getElementById('loadingIndicator');

            if (!message) {
                alert('Message cannot be empty.');
                return;
            }

            loadingIndicator.style.display = 'block';
            // Simulate sending message (replace with actual send logic)
            setTimeout(() => {
                try {
                    // Send message functionality (placeholder)
                    const messageContainer = document.getElementById('messages');
                    const newMessage = document.createElement('div');
                    newMessage.textContent = message; // XSS protection
                    messageContainer.appendChild(newMessage);
                    messageInput.value = '';
                } catch (error) {
                    console.error('Error sending message:', error);
                    alert('Failed to send message. Please try again.');
                } finally {
                    loadingIndicator.style.display = 'none';
                }
            }, 1000);
        }

        // Improved loadMessages function with loading states
        function loadMessages() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            loadingIndicator.style.display = 'block';
            // Simulate loading messages (replace with actual load logic)
            setTimeout(() => {
                try {
                    // Load message functionality (placeholder)
                    const messageContainer = document.getElementById('messages');
                    const sampleMessages = ['Hello World!', 'This is a test message.'];
                    sampleMessages.forEach(msg => {
                        const messageElement = document.createElement('div');
                        messageElement.textContent = msg; // XSS protection
                        messageContainer.appendChild(messageElement);
                    });
                } catch (error) {
                    console.error('Error loading messages:', error);
                } finally {
                    loadingIndicator.style.display = 'none';
                }
            }, 1000);
        }
    </script>
</head>
<body onload="loadMessages()">
    <div id="loadingIndicator" style="display: none;">Loading...</div>
    <input type="text" id="messageInput" placeholder="Type a message" />
    <button onclick="sendMessage()">Send</button>
    <div id="messages"></div>
</body>
</html>
